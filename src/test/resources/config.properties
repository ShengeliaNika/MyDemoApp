# ---------------------------------------------------------------------------
# Appium server
# ---------------------------------------------------------------------------
# If appium.server.autostart=true, the framework starts/stops a local Appium
# server for the run (no need to run `appium` manually). Set to false to
# attach to a server you started yourself (or a remote/cloud one) at
# appium.server.url.
appium.server.autostart=true
appium.server.url=http://127.0.0.1:4723

# ---------------------------------------------------------------------------
# Device / capabilities
# ---------------------------------------------------------------------------
platform.name=Android
automation.name=UiAutomator2
device.name=emulator-5554
# platform.version is intentionally left blank so Appium auto-detects it from
# whatever device/emulator is connected. Override with -Dplatform.version=...
platform.version=

app.package=com.saucelabs.mydemoapp.android
app.activity=.view.activities.SplashActivity

new.command.timeout.seconds=120
# Clears app data before every session so tests never inherit state
# (logged-in user, cart contents) left over from a previous run, without
# paying for a full APK uninstall/reinstall (which is heavy on a local
# emulator and was causing the Appium server/instrumentation to become
# unstable across a full 17-test run).
full.reset=false

# ---------------------------------------------------------------------------
# Waits
# ---------------------------------------------------------------------------
explicit.wait.seconds=30
